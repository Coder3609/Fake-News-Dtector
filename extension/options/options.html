<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthLens Options</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #0b0f19;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }
    .container {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 30px;
      width: 100%;
      max-width: 500px;
    }
    h1 {
      margin-top: 0;
      color: #38bdf8;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.2);
      color: white;
      box-sizing: border-box;
    }
    button {
      background-color: #38bdf8;
      color: #0b0f19;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 16px;
    }
    button:hover {
      background-color: #7dd3fc;
    }
    #status {
      margin-top: 15px;
      color: #4ade80;
      font-weight: 500;
      text-align: center;
      height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TruthLens Settings</h1>
    <p>Please enter your API keys to enable serverless verification.</p>
    
    <div class="form-group">
      <label for="geminiKey">Gemini API Key (Google AI Studio)</label>
      <input type="password" id="geminiKey" placeholder="AIzaSy...">
    </div>

    <div class="form-group">
      <label for="tavilyKey">Tavily Search API Key</label>
      <input type="password" id="tavilyKey" placeholder="tvly-...">
    </div>

    <button id="saveBtn">Save Keys</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
